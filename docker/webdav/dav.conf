# SelfSync self-hosted WebDAV area (Apache mod_dav).
#
# mod_dav is the reference WebDAV implementation and honors strong If-Match /
# If-None-Match conditional requests, which SelfSync's manifest commit relies on
# for optimistic concurrency. (mod_dav marks an ETag *weak* for ~1s after a
# write; the plugin strips the W/ prefix and the engine spaces commits out, so
# this is transparent — see normalizeEtag in src/backend/webdav-backend.ts.)
ServerName localhost
DavLockDB /var/davlock/lockdb
DocumentRoot /var/dav

<Directory "/var/dav">
    Dav On
    Options Indexes
    AllowOverride None
    AuthType Basic
    AuthName "SelfSync WebDAV"
    AuthUserFile /usr/local/apache2/conf/dav.htpasswd
    Require valid-user
</Directory>
