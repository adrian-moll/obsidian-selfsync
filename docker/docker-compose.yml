# Self-hosted backends for SelfSync.
#
#   docker compose up -d webdav        # the sync backend
#
# WebDAV   — the sync backend. Apache mod_dav: the reference WebDAV
#            implementation, with the strong conditional-request (If-Match)
#            support SelfSync's optimistic concurrency needs. In SelfSync set the
#            WebDAV URL to http://<host>:8080 and the credentials below.
# Gitea    — an optional Git remote for the desktop Git backup.
#
# For internet exposure, put these behind a TLS-terminating reverse proxy
# (Caddy/Traefik) — do NOT expose plain HTTP. Change the passwords below.
# Mobile Obsidian effectively requires HTTPS, so the proxy is not optional there.

services:
  webdav:
    build: ./webdav
    container_name: selfsync-webdav
    restart: unless-stopped
    environment:
      WEBDAV_USER: selfsync
      WEBDAV_PASSWORD: change-me-please
    ports:
      - "8080:80"
    volumes:
      - webdav-data:/var/dav

  gitea:
    image: gitea/gitea:1
    container_name: selfsync-gitea
    restart: unless-stopped
    profiles: ["gitea"] # opt-in: `docker compose --profile gitea up -d`
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
    ports:
      - "3000:3000" # web UI + HTTPS git
      - "2222:22" # ssh (optional)
    volumes:
      - gitea-data:/data

volumes:
  webdav-data:
  gitea-data:
